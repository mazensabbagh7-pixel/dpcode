<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=Inter:opsz,wght@14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Mazen Code (Alpha)</title>
    <style>
      /* Boot splash — shown while the JS bundle is parsing and React mounts.
         React's createRoot(...).render(...) wipes #root's children, so no teardown needed. */
      html,
      body {
        margin: 0;
        padding: 0;
        background: transparent;
        /* Prevent a white flash before the app's own styles load. */
        color-scheme: light dark;
      }
      #root {
        min-height: 100vh;
      }
      .app-boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        -webkit-app-region: drag;
        pointer-events: none;
      }
      .app-boot-splash__icon {
        width: 112px;
        height: 112px;
        border-radius: 26px; /* ~23% — macOS squircle-ish */
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.12),
          0 12px 32px rgba(0, 0, 0, 0.28);
        opacity: 0;
        transform: scale(0.96);
        animation:
          app-boot-splash-in 420ms ease-out forwards,
          app-boot-splash-pulse 2.4s ease-in-out 420ms infinite;
      }
      @keyframes app-boot-splash-in {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes app-boot-splash-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.98);
          opacity: 0.85;
        }
      }
      .app-boot-splash__text {
        margin: 0;
        color: rgba(148, 163, 184, 0.82);
        font: 500 13px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }
      .app-boot-splash__dots {
        display: inline-block;
        width: 1.5ch;
        text-align: left;
      }
      .app-boot-splash__dots::after {
        content: "";
        animation: app-boot-ellipsis 1.2s steps(1) infinite;
      }
      @keyframes app-boot-ellipsis {
        0%,
        20% {
          content: "";
        }
        40% {
          content: ".";
        }
        60% {
          content: "..";
        }
        80%,
        100% {
          content: "...";
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-boot-splash__icon {
          animation: app-boot-splash-in 200ms ease-out forwards;
        }
        .app-boot-splash__dots::after {
          content: "...";
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-boot-splash" role="status" aria-live="polite" aria-busy="true">
        <img class="app-boot-splash__icon" src="/dpcode.png" alt="" draggable="false" />
        <p class="app-boot-splash__text">Opening MazenCode<span class="app-boot-splash__dots"></span></p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
